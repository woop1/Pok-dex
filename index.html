<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 via-white to-slate-200 min-h-screen p-6">

  <h1 class="text-4xl font-extrabold text-center text-slate-800 mb-6 tracking-wide">
    Pokédex
  </h1>

  <!-- BUSCADOR -->
  <div class="max-w-md mx-auto flex gap-2 mb-6">
    <input id="buscador" type="text" placeholder="Busca un Pokémon (ej. charizard)"
      class="flex-1 p-2 rounded-lg border border-slate-300">

    <button id="btn-buscar"
      class="px-4 py-2 bg-yellow-400 font-semibold rounded-lg hover:bg-yellow-500">
      Buscar
    </button>
  </div>

  <!-- RESULTADOS / REJILLA -->
  <div id="resultado"
    class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto">
  </div>

  <!-- BOTÓN CARGAR MÁS (IMPORTANTE) -->
  <div class="text-center my-6">
    <button id="cargar-mas"
      class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800">
      Cargar más
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
